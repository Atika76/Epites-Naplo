name: Deploy Építési Napló import functions

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/create-szakipiac-import/**'
      - 'supabase/functions/claim-szakipiac-import/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-epites-import-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare Supabase temp folder
        run: |
          rm -rf supabase/.temp
          mkdir -p supabase/.temp

      - name: Deploy create-szakipiac-import
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy create-szakipiac-import --project-ref tcmihuwjlapfaonihdma --no-verify-jwt --debug

      - name: Deploy claim-szakipiac-import
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy claim-szakipiac-import --project-ref tcmihuwjlapfaonihdma --no-verify-jwt --debug
