name: Deploy Építési Napló import functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Supabase temp folder
        run: |
          rm -rf supabase/.temp
          mkdir -p supabase/.temp

      - name: Deploy create-szakipiac-import
        run: npx --yes supabase@latest functions deploy create-szakipiac-import --project-ref tcmihuwjlapfaonihdma --no-verify-jwt --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy claim-szakipiac-import
        run: npx --yes supabase@latest functions deploy claim-szakipiac-import --project-ref tcmihuwjlapfaonihdma --no-verify-jwt --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
