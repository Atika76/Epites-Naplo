<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ügyfélriport – ÉpítésNapló AI PRO</title>
  <meta name="description" content="Kártyásan megosztható, fotókkal igazolt, csak olvasható építési ügyfélriport." />
  <link rel="canonical" href="https://epitesi-naplo.eu/share.html" />
  <link rel="icon" type="image/png" sizes="192x192" href="https://epitesi-naplo.eu/favicon.png" />

  <!-- Univerzális megosztási kártya: Messenger, Facebook, WhatsApp, Viber, Telegram, LinkedIn stb. -->
  <meta property="og:locale" content="hu_HU" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ÉpítésNapló AI PRO" />
  <meta property="og:title" content="Ügyfélriport – ÉpítésNapló AI PRO" />
  <meta property="og:description" content="Fotókkal igazolt, csak olvasható építési riport. Képgaléria, PDF, dokumentáció és ügyfél jóváhagyás." />
  <meta property="og:url" content="https://epitesi-naplo.eu/share.html" />
  <meta property="og:image" content="https://epitesi-naplo.eu/og-ugyfelriport-card.png" />
  <meta property="og:image:secure_url" content="https://epitesi-naplo.eu/og-ugyfelriport-card.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Ügyfélriport – ÉpítésNapló AI PRO" />

  <!-- Twitter/X és olyan appok, amelyek ezt olvassák -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ügyfélriport – ÉpítésNapló AI PRO" />
  <meta name="twitter:description" content="Fotókkal igazolt, csak olvasható építési riport." />
  <meta name="twitter:image" content="https://epitesi-naplo.eu/og-ugyfelriport-card.png" />

  <!-- Google/Telegram extra képjelzések -->
  <meta itemprop="name" content="Ügyfélriport – ÉpítésNapló AI PRO" />
  <meta itemprop="description" content="Kártyásan megosztható építési ügyfélriport." />
  <meta itemprop="image" content="https://epitesi-naplo.eu/og-ugyfelriport-card.png" />
  <meta name="theme-color" content="#0f172a" />

  <style>
    :root{--bg:#07111f;--card:#fff;--ink:#0f172a;--muted:#64748b;--gold:#fbbf24;--line:#dbeafe;}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#153154 0,#07111f 52%,#030712 100%);color:#fff;font-family:Arial,Helvetica,sans-serif;padding:22px}.card{width:min(620px,100%);background:var(--card);color:var(--ink);border-radius:28px;padding:28px;box-shadow:0 22px 80px rgba(0,0,0,.42);border:1px solid var(--line)}.top{display:flex;gap:16px;align-items:center}.logo{width:68px;height:68px;border-radius:18px;box-shadow:0 10px 28px rgba(15,23,42,.18)}h1{margin:0;font-size:clamp(28px,6vw,42px);line-height:1.05}.badge{display:inline-flex;margin:18px 0 8px;background:#dcfce7;color:#166534;padding:8px 12px;border-radius:999px;font-weight:900;font-size:14px}p{color:var(--muted);line-height:1.55;font-size:17px}.btn{display:inline-block;margin-top:14px;background:var(--gold);color:#111827;text-decoration:none;font-weight:900;border-radius:16px;padding:15px 20px}.hint{font-size:13px;color:#94a3b8;margin-top:14px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.mini{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:12px;text-align:center;font-weight:800;color:#334155;font-size:13px}@media(max-width:520px){.top{align-items:flex-start}.logo{width:56px;height:56px}.grid{grid-template-columns:1fr}.card{padding:22px;border-radius:24px}}
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <img class="logo" src="https://epitesi-naplo.eu/favicon.png" alt="ÉpítésNapló">
      <h1>Ügyfélriport megnyitása</h1>
    </div>
    <div class="badge">✅ Kártyás megosztásra előkészítve</div>
    <p>Fotókkal igazolt, csak olvasható építési riport. A teljes dokumentáció megnyitása folyamatban...</p>
    <div class="grid">
      <div class="mini">📷 Fotók</div>
      <div class="mini">📄 PDF</div>
      <div class="mini">✅ Jóváhagyás</div>
    </div>
    <a id="openBtn" class="btn" href="view.html">Riport megnyitása</a>
    <div class="hint">Ha nem nyílik meg automatikusan, nyomd meg a gombot.</div>
  </main>
  <script>
    (function(){
      var p=new URLSearchParams(location.search);
      var token=p.get('riport')||p.get('token')||p.get('report')||p.get('id')||'';
      var target=new URL('view.html', location.href);
      if(token) target.searchParams.set('riport', token);
      var btn=document.getElementById('openBtn');
      btn.href=target.href;
      setTimeout(function(){ location.replace(target.href); }, 700);
    })();
  </script>
</body>
</html>
