<body>
  <header class="top">
    <div class="topInner">
      <div class="brand"><img src="https://epitesi-naplo.eu/favicon.png" alt="ÉpítésNapló ikon"><div><h1>Építési napló ügyfél nézet</h1><p>Csak olvasható ügyfélriport. Szerkeszteni nem lehet.</p></div></div>
      <div class="actions">
        <button id="reportMenuBtn" class="reportMenuBtn" type="button" aria-label="Riport műveletek" aria-expanded="false" onclick="toggleReportMenu(event)">&#9776;</button>
        <div id="reportMenu" class="reportMenu" role="menu">
          <button class="btn primary" type="button" onclick="downloadPublicPdfV110(this); closeReportMenu()">PDF letöltés</button>
          <button class="btn ghost" type="button" onclick="window.print(); closeReportMenu()">Nyomtatás</button>
          <button class="btn ghost" type="button" onclick="copyReportLink(this); closeReportMenu()">Link másolása</button>
        </div>
      </div>
    </div>
  </header>
  <main>
    <section id="publicReportContent" class="reportWrap"><div class="loading">Riport betöltése...</div></section>
    <section id="approvalBox" class="approvalBox hidden"></section>

  <script>
    function closeReportMenu(){
      var menu=document.getElementById('reportMenu');
      var btn=document.getElementById('reportMenuBtn');
      if(menu) menu.classList.remove('open');
      if(btn) btn.setAttribute('aria-expanded','false');
    }
    function toggleReportMenu(event){
      if(event) event.stopPropagation();
      var menu=document.getElementById('reportMenu');
      var btn=document.getElementById('reportMenuBtn');
      if(!menu || !btn) return;
      var open=!menu.classList.contains('open');
      menu.classList.toggle('open',open);
      btn.setAttribute('aria-expanded',open?'true':'false');
    }
    document.addEventListener('click',function(event){
      if(!event.target.closest('.actions')) closeReportMenu();
    });
    document.addEventListener('keydown',function(event){
      if(event.key==='Escape') closeReportMenu();
    });
    (function(){
      var top=document.querySelector('.top');
      if(!top) return;
      var lastY=Math.max(0,window.scrollY||document.documentElement.scrollTop||0);
      var ticking=false;
      function menuOpen(){
        var menu=document.getElementById('reportMenu');
        return !!(menu && menu.classList.contains('open'));
      }
      function showHeader(){
        top.classList.remove('v172ReportHeaderHidden');
      }
      function updateHeader(){
        ticking=false;
        var y=Math.max(0,window.scrollY||document.documentElement.scrollTop||0);
        var delta=y-lastY;
        if(y<70 || menuOpen()) showHeader();
        else if(delta>7) top.classList.add('v172ReportHeaderHidden');
        else if(delta<-1) showHeader();
        lastY=y;
      }
      window.addEventListener('scroll',function(){
        if(!ticking){
          ticking=true;
          requestAnimationFrame(updateHeader);
        }
      },{passive:true});
      window.addEventListener('resize',showHeader,{passive:true});
      window.addEventListener('focusin',showHeader);
    })();
    window.downloadPublicPdfV110 = async function(btn){
      var old=btn ? btn.innerText : '';
      if(btn){ btn.disabled=true; btn.classList.add('is-loading'); btn.innerText='PDF készül...'; }
      try{
        var box=document.getElementById('publicReportContent');
        var clone=box ? box.cloneNode(true) : null;
        if(clone) clone.querySelectorAll('.reportOpenedBox,.v110Gallery,.hidden,script').forEach(function(x){ x.remove(); });
        var content=clone ? clone.innerHTML : '<h1>Ügyfélriport</h1><p>Nincs betöltött riport.</p>';
        var css='*{box-sizing:border-box}html,body{width:100%;max-width:100%;overflow-x:hidden}body{margin:0;background:#fff;color:#111827;font-family:Arial,Helvetica,sans-serif;line-height:1.45;padding:16px}.printDoc{width:min(980px,100%);margin:0 auto;background:#fff}h1{font-size:30px;line-height:1.1;margin:12px 0}h2{font-size:22px;margin:22px 0 10px}h3{font-size:18px;margin:18px 0 8px}p{margin:8px 0}.cover{border-bottom:4px solid #f59e0b;margin-bottom:20px;padding-bottom:16px}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:14px 0}.stat{background:#f3f4f6;border-radius:10px;padding:10px}.stat b{display:block;color:#d97706;font-size:20px}.entry{break-inside:avoid;border-left:4px solid #f59e0b;background:#fafafa;margin:14px 0;padding:14px;border-radius:12px}.photos,.entryImageGrid,.reportImageGrid,.v68ReportPhotos,.v117Photos{display:grid!important;grid-template-columns:repeat(auto-fill,minmax(105px,105px))!important;gap:10px!important;justify-content:start!important}.v67ReportPhoto,figure,.reportMediaTile{width:105px!important;max-width:105px!important;margin:0!important;border:1px solid #e5e7eb!important;border-radius:10px!important;padding:5px!important;background:#fff!important;break-inside:avoid!important}.v67ReportPhoto img,figure img,.reportMediaTile img{width:95px!important;height:95px!important;object-fit:cover!important;border-radius:8px!important;display:block!important}video{max-width:100%;border-radius:8px}figcaption,.v67ReportPhoto span{font-size:10px;color:#64748b;display:block;margin-top:4px}table{display:block;width:100%;max-width:100%;overflow-x:auto;border-collapse:collapse}td,th{border-bottom:1px solid #e5e7eb;padding:7px;text-align:left}@media(min-width:720px){body{padding:24px}.stats{grid-template-columns:repeat(5,minmax(0,1fr))}}@media print{body{padding:8mm}.entry,.v67ReportPhoto,figure{break-inside:avoid;page-break-inside:avoid}}';
        var w=window.open('', '_blank');
        if(!w){ alert('A böngésző blokkolta az új ablakot. Engedélyezd az előugró ablakot.'); return; }
        var html='<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ÉpítésNapló ügyfélriport PDF</title><style>'+css+'</style></head><body><main class="printDoc">'+content+'</main><script>function wi(){var imgs=Array.prototype.slice.call(document.images||[]);return Promise.race([Promise.all(imgs.map(function(i){return i.complete?Promise.resolve():new Promise(function(r){i.onload=r;i.onerror=r;});})),new Promise(function(r){setTimeout(r,3500);})]);}window.addEventListener("load",function(){wi().then(function(){setTimeout(function(){window.focus();window.print();},500);});});<\/script></body></html>';
        w.document.open();
        w.document.write(html);
        w.document.close();
      }finally{
        if(btn){ btn.disabled=false; btn.classList.remove('is-loading'); btn.innerText=old || 'PDF letöltés'; }
      }
    };
  </script>
