<body class="auth-loading">

      <button id="logoutBtn" class="btn small ghost hidden" onclick="window.location.href='logout.html'">KilĂ©pĂ©s</button>
    </nav>
  </header>

  <main class="inboxShell">
    <div class="inboxHeader">
      <div>
        <p class="badge">CĂ©gweb26 admin kĂ¶zpont</p>
        <h1>BeĂ©rkezett admin ĂĽzenetek</h1>
        <p class="muted">Itt lĂˇtod a felhasznĂˇlĂłk tĂˇmogatĂˇsi kĂ©rĂ©seit Ă©s kĂ©rdĂ©seit. A vĂˇlasz gomb a sajĂˇt levelezĹ‘det nyitja meg.</p>
      </div>
      <button class="btn primary" onclick="loadInbox()">FrissĂ­tĂ©s</button>
    </div>

    <section class="card wide">
      <div class="adminToolbar">
        <input id="inboxSearch" placeholder="KeresĂ©s nĂ©v, email, tĂˇrgy vagy ĂĽzenet alapjĂˇn" oninput="renderInbox()" />
        <select id="inboxFilter" onchange="renderInbox()">
          <option value="all">Ă–sszes</option>
          <option value="new">Csak Ăşj</option>
          <option value="read">Elolvasott</option>
        </select>
      </div>
      <div id="inboxList" class="inboxGrid"><p class="muted">BetĂ¶ltĂ©s...</p></div>
    </section>
  </main>

  <div id="authModal" class="modal hidden">
    <div class="modalContent">
      <button class="closeBtn" onclick="closeAuthModal()">Ă—</button>
      <h2>Admin belĂ©pĂ©s</h2>
      <p class="muted">Admin email: cegweb26@gmail.com</p>
      <input id="authName" placeholder="NĂ©v / cĂ©gnĂ©v" />
      <input id="authEmail" placeholder="Email cĂ­m" type="email" />
      <button class="btn primary full" onclick="loginUser()">BelĂ©pĂ©si link kĂ©rĂ©se</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-adapter.js?v=110"></script>
  <script src="header-v40.js?v=183"></script>
  <script src="v180-delete-notification-admin-fix.js?v=180"></script>
  <script>
    let inboxUser = null;
    let inboxMessages = [];

    function safeEl(id){return document.getElementById(id)}
    function openAuthModal(){safeEl('authModal').classList.remove('hidden')}
    function closeAuthModal(){safeEl('authModal').classList.add('hidden')}
    async function loginUser(){
      const name = safeEl('authName').value.trim() || 'Admin';
      const email = safeEl('authEmail').value.trim();
      if(!email) return alert('Adj meg email cĂ­met.');
      await window.EpitesNaploAPI.signInOrSignUp(email,name);
    }
    async function logoutUser(){ window.location.href='logout.html'; }
    function escapeHtml(str){return String(str ?? '').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
    function formatDate(value){try{return new Date(value).toLocaleString('hu-HU')}catch{return value||''}}

    async function initInbox(){
      inboxUser = await window.EpitesNaploAPI.getCurrentUser();
      safeEl('loginBtn').classList.toggle('hidden', !!inboxUser);
      safeEl('logoutBtn').classList.toggle('hidden', !inboxUser);
      if(!inboxUser){ safeEl('inboxList').innerHTML='<p class="muted">BelĂ©pĂ©s szĂĽksĂ©ges.</p>'; return; }
      if(inboxUser.email !== window.EPITESNAPLO_CONFIG.adminEmail){
        safeEl('inboxList').innerHTML='<p class="muted">Ez az oldal csak adminnak lĂˇthatĂł.</p>';
        return;
      }
      await loadInbox();
    }

    async function loadInbox(){
      inboxMessages = await window.EpitesNaploAPI.getAdminSupportMessages();
      renderInbox();
    }

    function renderInbox(){
      const q=(safeEl('inboxSearch')?.value||'').toLowerCase();
      const f=safeEl('inboxFilter')?.value||'all';
      let list=[...inboxMessages];
      if(f!=='all') list=list.filter(m=>(m.status||'new')===f);
      if(q) list=list.filter(m=>[m.name,m.email,m.subject,m.message].join(' ').toLowerCase().includes(q));
      safeEl('inboxList').innerHTML = list.map(m=>`
        <article class="inboxMessage ${(m.status||'new')==='new'?'new':''}">
          <span class="statusPill">${escapeHtml(m.status||'new')}</span>
          <h3>${escapeHtml(m.subject||'Ăśzenet')}</h3>
          <div class="messageMeta">${escapeHtml(m.name||'')} â€˘ ${escapeHtml(m.email||'')} â€˘ ${formatDate(m.created_at)}</div>
          <p>${escapeHtml(m.message||'')}</p>
          <button class="btn small ghost" onclick="markRead('${m.id}')">Elolvasva</button>
          <a class="btn small primary replyLink" href="mailto:${escapeHtml(m.email||'')}?subject=${encodeURIComponent('VĂˇlasz: '+(m.subject||'Ăśzenet'))}">VĂˇlasz emailben</a>
        </article>`).join('') || '<p class="muted">Nincs ilyen ĂĽzenet.</p>';
    }

    async function markRead(id){
      await window.EpitesNaploAPI.markSupportMessageRead(id);
      await loadInbox();
    }

    initInbox();
  </script>
<script>window.addEventListener("DOMContentLoaded",()=>setTimeout(()=>document.body.classList.remove("auth-loading"),500));</script>
</body>
