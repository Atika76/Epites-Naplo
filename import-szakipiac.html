<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SzakiPiac import - Építési Napló</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #e5e7eb;
      background: radial-gradient(circle at top left, #334155, #0f172a 55%, #020617);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: rgba(15, 23, 42, .88);
      border: 1px solid rgba(148, 163, 184, .28);
      border-radius: 24px;
      box-shadow: 0 24px 90px rgba(0,0,0,.38);
      padding: 28px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 38px); }
    p { color: #cbd5e1; line-height: 1.55; }
    label { display: block; margin: 14px 0 6px; font-weight: 800; color: #f8fafc; }
    input {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, .35);
      border-radius: 14px;
      background: rgba(2, 6, 23, .7);
      color: #fff;
      padding: 13px 14px;
      font-size: 16px;
    }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      margin-top: 16px;
      background: #f59e0b;
      color: #111827;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
    }
    button.secondary { background: #1f2937; color: #e5e7eb; border: 1px solid rgba(148, 163, 184, .28); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .hidden { display: none !important; }
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(30, 41, 59, .8);
      border: 1px solid rgba(148, 163, 184, .22);
      white-space: pre-wrap;
    }
    .ok { border-color: rgba(34, 197, 94, .55); background: rgba(20, 83, 45, .35); }
    .error { border-color: rgba(239, 68, 68, .6); background: rgba(127, 29, 29, .35); }
    .muted { color: #94a3b8; font-size: 13px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>SzakiPiac ajánlat import</h1>
    <p>Jelentkezz be az Építési Napló fiókoddal, és az átküldött SzakiPiac ajánlatból új projekt készül.</p>

    <section id="authBox" class="hidden">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" placeholder="email@pelda.hu">
      <label for="password">Jelszó</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Jelszó">
      <div class="row">
        <button id="loginBtn">Belépés és import</button>
        <button id="signupBtn" class="secondary">Regisztráció</button>
      </div>
      <p class="muted">Ha már be vagy jelentkezve ebben a böngészőben, az import automatikusan indul.</p>
    </section>

    <section id="claimBox" class="hidden">
      <p id="userLine" class="muted"></p>
      <label for="tokenInput">Import token</label>
      <input id="tokenInput" placeholder="A linkből automatikusan kitöltjük">
      <div class="row">
        <button id="claimBtn">Projekt létrehozása</button>
        <button id="logoutBtn" class="secondary">Kilépés</button>
      </div>
    </section>

    <div id="status" class="status">Import előkészítése...</div>
  </main>

  <script>
    const EPITESNAPLO_CONFIG = {
      supabaseUrl: "https://tcmihuwjlapfaonihdma.supabase.co",
      supabaseAnonKey: "sb_publishable_TC5UHGi1CZGVFnz2py1HiQ_fn-wxy81"
    };

    const supa = supabase.createClient(EPITESNAPLO_CONFIG.supabaseUrl, EPITESNAPLO_CONFIG.supabaseAnonKey);
    const $ = (id) => document.getElementById(id);

    function tokenFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return String(params.get("token") || params.get("import") || params.get("szakipiac") || "").trim();
    }

    function setStatus(message, type = "") {
      const box = $("status");
      box.textContent = message;
      box.className = `status ${type}`.trim();
    }

    async function getSession() {
      const { data } = await supa.auth.getSession();
      return data?.session || null;
    }

    function showAuth() {
      $("authBox").classList.remove("hidden");
      $("claimBox").classList.add("hidden");
      setStatus("Belépés után folytatjuk az importot.");
    }

    async function showClaim(session) {
      $("authBox").classList.add("hidden");
      $("claimBox").classList.remove("hidden");
      $("userLine").textContent = `Belépve: ${session.user.email}`;
      $("tokenInput").value = tokenFromUrl() || $("tokenInput").value;
      if ($("tokenInput").value) {
        await claimImport();
      } else {
        setStatus("Hiányzik az import token. Nyisd meg a SzakiPiacból kapott linket.", "error");
      }
    }

    async function claimImport() {
      const token = $("tokenInput").value.trim();
      if (!token) return setStatus("Hiányzó import token.", "error");

      setStatus("Projekt létrehozása folyamatban...");
      const { data, error } = await supa.functions.invoke("claim-szakipiac-import", {
        body: { token }
      });

      if (error || data?.ok === false) {
        return setStatus(data?.error || error?.message || "Nem sikerült az import.", "error");
      }

      const warnings = Array.isArray(data.warnings) && data.warnings.length
        ? "\n\nFigyelmeztetések:\n- " + data.warnings.join("\n- ")
        : "";
      setStatus(`Kész. A projekt létrejött.${warnings}`, "ok");

      const projectUrl = `project.html?id=${encodeURIComponent(data.project_id)}`;
      setTimeout(() => { window.location.href = projectUrl; }, 1200);
    }

    $("loginBtn").addEventListener("click", async () => {
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return setStatus("Add meg az e-mailt és a jelszót.", "error");
      setStatus("Belépés...");
      const { data, error } = await supa.auth.signInWithPassword({ email, password });
      if (error) return setStatus(error.message, "error");
      await showClaim(data.session);
    });

    $("signupBtn").addEventListener("click", async () => {
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return setStatus("Add meg az e-mailt és a jelszót.", "error");
      setStatus("Regisztráció...");
      const { error } = await supa.auth.signUp({ email, password });
      if (error) return setStatus(error.message, "error");
      setStatus("Regisztráció kész. Ha a Supabase e-mail megerősítést kér, erősítsd meg, majd lépj be.");
    });

    $("claimBtn").addEventListener("click", claimImport);
    $("logoutBtn").addEventListener("click", async () => {
      await supa.auth.signOut();
      showAuth();
    });

    (async function boot() {
      $("tokenInput").value = tokenFromUrl();
      const session = await getSession();
      if (!session) return showAuth();
      await showClaim(session);
    })();
  </script>
</body>
</html>
