<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Új jelszó – ÉpítésNapló AI PRO</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css?v=76" />
</head>
<body>
  <main class="resetPage">
    <section class="card resetCard">
      <div class="resetLogo"><img src="favicon.svg" alt="ÉpítésNapló ikon" /><div><strong>ÉpítésNapló AI PRO</strong><br><span class="muted">Új jelszó beállítása</span></div></div>
      <h1 style="font-size:36px;line-height:1.05;margin:10px 0 12px;">Állíts be új jelszót</h1>
      <p class="muted">Írd be az új jelszavadat. Ezután email + jelszóval tudsz belépni.</p>
      <div class="authField"><label>Új jelszó</label><div class="passwordWrap"><input id="newPassword" type="password" placeholder="Legalább 6 karakter" autocomplete="new-password" /><button class="passwordToggle" type="button" onclick="toggleNewPassword()">👁</button></div></div>
      <div class="authField"><label>Új jelszó még egyszer</label><div class="passwordWrap"><input id="newPassword2" type="password" placeholder="Jelszó ismétlése" autocomplete="new-password" /><button class="passwordToggle" type="button" onclick="toggleNewPassword2()">👁</button></div></div>
      <button id="savePasswordBtn" class="btn primary full" onclick="saveNewPassword()">Új jelszó mentése</button>
      <a class="btn ghost full" style="display:block;text-align:center;" href="index.html">Vissza a belépéshez</a>
      <div class="notice">Ha ez az oldal email linkből nyílt meg, a jelszó mentése működni fog.</div>
    </section>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-adapter.js?v=76"></script>
  <script>
    function toast(message, type = 'ok') { const el = document.getElementById('toast'); el.textContent = message; el.className = 'toast ' + type; setTimeout(() => el.classList.add('hidden'), 3500); }
    function toggleNewPassword(){ const i=document.getElementById('newPassword'); i.type=i.type==='password'?'text':'password'; }
    function toggleNewPassword2(){ const i=document.getElementById('newPassword2'); i.type=i.type==='password'?'text':'password'; }
    function friendly(error) { const msg = String(error?.message || error || '').toLowerCase(); if (msg.includes('password')) return 'A jelszó legalább 6 karakter legyen.'; if (msg.includes('session')) return 'A visszaállító link lejárt vagy nem érvényes. Kérj új linket.'; return error?.message || 'Nem sikerült menteni az új jelszót.'; }
    async function saveNewPassword() { const p1=document.getElementById('newPassword').value.trim(); const p2=document.getElementById('newPassword2').value.trim(); const btn=document.getElementById('savePasswordBtn'); if(p1.length<6) return toast('Legalább 6 karakteres jelszót adj meg.','error'); if(p1!==p2) return toast('A két jelszó nem egyezik.','error'); try { btn.disabled=true; btn.textContent='Mentés...'; await window.EpitesNaploAPI.updatePassword(p1); toast('Jelszó sikeresen frissítve. Most már be tudsz lépni email + jelszóval.','ok'); setTimeout(()=>{window.location.href='index.html';},1600); } catch(error){ toast(friendly(error),'error'); } finally { btn.disabled=false; btn.textContent='Új jelszó mentése'; } }
  </script>
</body>
</html>
